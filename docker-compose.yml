services:
  lifeos-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lifeos-api
    command: ["uvicorn", "lifeos.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    environment:
      HF_API_TOKEN: ${HF_API_TOKEN:-}
      LIFEOS_HF_MODEL: ${LIFEOS_HF_MODEL:-}
      WANDB_API_KEY: ${WANDB_API_KEY:-}
    volumes:
      - ./lifeos/data:/app/lifeos/data
      - ./lifeos/outputs:/app/lifeos/outputs
      - ./models:/app/models

  echo_env:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: echo-env
    profiles: ["envs"]
    command: ["uvicorn", "lifeos.env_services.echo_app:app", "--host", "0.0.0.0", "--port", "8101"]
    ports:
      - "8101:8101"

  coding_env:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: coding-env
    profiles: ["envs"]
    command: ["uvicorn", "lifeos.env_services.coding_app:app", "--host", "0.0.0.0", "--port", "8102"]
    ports:
      - "8102:8102"

  chess_env:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chess-env
    profiles: ["envs"]
    command: ["uvicorn", "lifeos.env_services.chess_app:app", "--host", "0.0.0.0", "--port", "8103"]
    ports:
      - "8103:8103"

  carla_env:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: carla-env
    profiles: ["envs"]
    command: ["uvicorn", "lifeos.env_services.carla_app:app", "--host", "0.0.0.0", "--port", "8104"]
    ports:
      - "8104:8104"

  julia_env:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: julia-env
    profiles: ["envs"]
    command: ["uvicorn", "lifeos.env_services.julia_app:app", "--host", "0.0.0.0", "--port", "8105"]
    ports:
      - "8105:8105"
    healthcheck:
      test: ["CMD-SHELL", "julia --version > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  lifeos-cli:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lifeos-cli
    profiles: ["tools"]
    command: ["python", "-m", "lifeos.cli", "--list-scenarios"]
    environment:
      HF_API_TOKEN: ${HF_API_TOKEN:-}
      LIFEOS_HF_MODEL: ${LIFEOS_HF_MODEL:-}
      WANDB_API_KEY: ${WANDB_API_KEY:-}
    volumes:
      - ./lifeos/data:/app/lifeos/data
      - ./lifeos/outputs:/app/lifeos/outputs
      - ./models:/app/models

